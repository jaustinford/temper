# yaml-language-server: $schema=../schemas/temper.json
---
temper:

  # set the sleep in seconds in between project
  # loops.

  loop_interval: 10

  # acceptable values are : 'celsius' or 'fahrenheit'.

  unit: celsius

  # project logging values for the 'MAIN_LOG'
  # object.

  logging:
    format:
      banner: "%(asctime)s [ %(levelname)s ] %(name)s - %(message)s"
      date: "%Y-%m-%d"
      time: "%H:%M:%S"
